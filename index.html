<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YellowBeard · Prioritization Dashboard</title>
<style>
  :root {
    color-scheme: light;
    --purple: #5B5FC7;
    --purple-light: #EEEEF8;
    --purple-lighter: #F7F7FC;
    --dark: #2D2D2D;
    --gray: #5F6068;
    --border: #D8D8EE;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--purple-lighter); color: var(--dark); font-size: 13px; }

  /* Password gate */
  #pw-gate { position: fixed; inset: 0; background: var(--purple); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  #pw-gate.hidden { display: none; }
  .pw-box { background: white; border-radius: 14px; padding: 40px 36px; width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .pw-box h2 { font-size: 17px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
  .pw-box p { font-size: 12px; color: var(--gray); margin-bottom: 24px; }
  .pw-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 12px; }
  .pw-input:focus { border-color: var(--purple); }
  .pw-btn { width: 100%; padding: 10px; background: var(--purple); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .pw-btn:hover { opacity: 0.9; }
  .pw-error { font-size: 12px; color: #e53e3e; margin-top: 8px; min-height: 16px; }

  .header { background: var(--purple); color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header p { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
  .btn-ghost { background: rgba(255,255,255,0.18); color: white; }
  .btn-ghost:hover { background: rgba(255,255,255,0.28); }
  .sync-status { font-size: 11px; opacity: 0.7; }

  .stats-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; background: white; padding: 10px 12px; text-align: center; }
  .stat .val { font-size: 20px; font-weight: 700; color: var(--purple); }
  .stat .lbl { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 1px; }

  .toolbar { padding: 10px 16px; background: white; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 150px; }
  .search-wrap input { width: 100%; padding: 6px 10px 6px 28px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--purple-lighter); outline: none; }
  .search-wrap input:focus { border-color: var(--purple); }
  .si { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--gray); }
  select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--purple-lighter); color: var(--dark); outline: none; cursor: pointer; }
  select:focus { border-color: var(--purple); }

  .ms-wrap { position: relative; }
  .ms-btn { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--purple-lighter); color: var(--dark); cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; font-family: inherit; }
  .ms-btn:hover, .ms-btn.open { border-color: var(--purple); }
  .ms-btn.active { border-color: var(--purple); background: var(--purple-light); color: var(--purple); font-weight: 600; }
  .ms-dropdown { position: absolute; top: calc(100% + 4px); left: 0; background: white; border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 200; min-width: 190px; padding: 4px 0; }
  .ms-option { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; font-size: 12px; color: var(--dark); user-select: none; }
  .ms-option:hover { background: var(--purple-lighter); }
  .ms-option input[type=checkbox] { accent-color: var(--purple); width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; }
  .ms-divider { height: 1px; background: var(--border); margin: 4px 0; }
  .ms-clear { display: block; width: 100%; text-align: left; padding: 6px 12px; font-size: 11px; color: var(--gray); background: none; border: none; cursor: pointer; font-family: inherit; }
  .ms-clear:hover { color: var(--purple); }

  .table-wrap { overflow: auto; max-height: calc(100vh - 172px); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { background: white; position: sticky; top: 0; z-index: 10; padding: 8px 10px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--gray); font-weight: 600; border-bottom: 2px solid var(--border); cursor: pointer; white-space: nowrap; user-select: none; }
  thead th:hover { color: var(--purple); }
  thead th.asc::after { content: ' ↑'; color: var(--purple); }
  thead th.desc::after { content: ' ↓'; color: var(--purple); }
  tbody tr { background: white; border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--purple-lighter); }
  tbody tr.done-row { opacity: 0.65; }
  td { padding: 8px 10px; vertical-align: middle; }

  .key a { color: var(--purple); text-decoration: none; font-weight: 600; white-space: nowrap; }
  .key a:hover { text-decoration: underline; }
  .summary { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .t-bug      { background:#fdecea; color:#c0392b; }
  .t-request  { background:#e8f4fd; color:#2980b9; }
  .t-email    { background:#fef9e7; color:#d68910; }
  .t-question { background:#f0f0f0; color:#555; }

  .pill { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .s-escalated  { background:#fdecea; color:#c0392b; }
  .s-waiting    { background:#fef3e2; color:#b7681d; }
  .s-inprogress { background:#e8f5e9; color:#27ae60; }
  .s-todo       { background:#f0f0f0; color:#555; }
  .s-onhold     { background:#fef9e7; color:#d68910; }
  .s-nextup     { background:#e8f4fd; color:#2980b9; }
  .s-done       { background:#e8f5e9; color:#27ae60; }

  .prio-major { color:#c0392b; font-weight:600; font-size:11px; }
  .prio-minor { color:#d68910; font-weight:600; font-size:11px; }

  .score-input { width:50px; padding:4px 6px; border:1px solid var(--border); border-radius:4px; font-size:12px; font-weight:600; color:var(--purple); text-align:center; background:var(--purple-lighter); outline:none; }
  .score-input:focus { border-color:var(--purple); background:white; }
  .notes-input { width:260px; min-height:54px; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px; line-height:1.5; color:var(--dark); background:var(--purple-lighter); outline:none; font-family:inherit; resize:vertical; }
  .notes-input:focus { border-color:var(--purple); background:white; }

  .no-results { text-align:center; padding:40px; color:var(--gray); }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--purple-lighter); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--purple); }
</style>
</head>
<body>

<div id="pw-gate">
  <div class="pw-box">
    <h2>YellowBeard Dashboard</h2>
    <p>Enter the password to continue</p>
    <input id="pw-input" class="pw-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Unlock</button>
    <div id="pw-error" class="pw-error"></div>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="#5B5FC7"/>
        <path d="M8 12h8M12 8v8" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <h1>YellowBeard · Prioritization Dashboard</h1>
      <p>Support ↔ Dev · Synced: <span id="sync-date"></span></p>
    </div>
  </div>
  <div class="header-right">
    <span style="font-size:11px;opacity:0.75;font-weight:500">Organization: YellowBeard</span>
    <button class="btn btn-ghost" onclick="exportCSV()">↓ Export CSV</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="si">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
    <input type="text" id="search" placeholder="Search tickets…" oninput="render()">
  </div>
  <select id="f-type" onchange="render()">
    <option value="">All types</option>
    <option>Bug</option><option>Request</option><option>Email</option><option>Question</option>
  </select>
  <div class="ms-wrap" id="ms-support-wrap">
    <button class="ms-btn" id="ms-support-btn" onclick="toggleMsDropdown(event)">
      <span id="ms-support-label">All Support statuses</span>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="ms-dropdown" id="ms-support-dd" style="display:none">
      <label class="ms-option"><input type="checkbox" value="Escalated" onchange="onStatusChange()"> Escalated</label>
      <label class="ms-option"><input type="checkbox" value="In Progress" onchange="onStatusChange()"> In Progress</label>
      <label class="ms-option"><input type="checkbox" value="Waiting for Support" onchange="onStatusChange()"> Waiting for Support</label>
      <label class="ms-option"><input type="checkbox" value="Done" onchange="onStatusChange()"> Done</label>
      <div class="ms-divider"></div>
      <button class="ms-clear" onclick="clearStatuses()">Clear selection</button>
    </div>
  </div>
  <select id="f-dev" onchange="render()">
    <option value="">All Dev statuses</option>
    <option>To Do</option><option>In Progress</option><option>NEXT UP</option><option>ON HOLD</option><option>Done</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr id="thead-row">
        <th onclick="sortBy('supportKey')">Support Ticket</th>
        <th onclick="sortBy('type')">Type</th>
        <th onclick="sortBy('summary')">Summary</th>
        <th onclick="sortBy('reporter')">Reporter</th>
        <th onclick="sortBy('supportStatus')">Support Status</th>
        <th onclick="sortBy('devKey')">Dev Ticket</th>
        <th>Sprint</th>
        <th onclick="sortBy('devStatus')">Dev Status</th>
        <th onclick="sortBy('created')">Created</th>
        <th onclick="sortBy('ybScore')">YB Score <span style="font-weight:400;opacity:.7">(1–20)</span></th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

let SPRINTS = {};

function loadSprints() {
  fetch('/api/sprints')
    .then(r => r.json())
    .then(data => { SPRINTS = data; render(); })
    .catch(() => {}); // silent fail — sprint column just shows —
}

// Load scores from server, fall back to localStorage
function loadScores() {
  fetch('/api/scores')
    .then(r => r.json())
    .then(saved => {
      DATA.forEach(t => {
        const v = saved['yb2_' + t.supportKey];
        if (v) { t.ybScore = v.s ?? null; t.notes = v.n || ''; }
      });
      render();
    })
    .catch(() => {
      // Fallback: load from localStorage
      DATA.forEach(t => {
        try {
          const s = localStorage.getItem('yb2_' + t.supportKey);
          if (s) { const p = JSON.parse(s); t.ybScore = p.s ?? null; t.notes = p.n || ''; }
        } catch(e) {}
      });
      render();
    });
}

// Save to server, mirror to localStorage as backup
function save(key) {
  const t = DATA.find(x => x.supportKey === key);
  if (!t) return;
  // Mirror to localStorage immediately
  try { localStorage.setItem('yb2_' + key, JSON.stringify({s: t.ybScore, n: t.notes})); } catch(e) {}
  // Persist to server
  fetch('/api/scores', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key: 'yb2_' + key, score: t.ybScore, notes: t.notes })
  }).catch(() => {}); // silent fail — localStorage has the backup
}

let sortCol = 'created', sortDir = -1;
const COL_KEYS = ['supportKey','type','summary','reporter','supportStatus','devKey','sprint','devStatus','created','ybScore'];

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('#thead-row th').forEach((th, i) => {
    th.className = COL_KEYS[i] === col ? (sortDir === 1 ? 'asc' : 'desc') : '';
  });
  render();
}

function toggleMsDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('ms-support-dd');
  const btn = document.getElementById('ms-support-btn');
  const open = dd.style.display === 'none';
  dd.style.display = open ? 'block' : 'none';
  btn.classList.toggle('open', open);
}

function onStatusChange() {
  const checked = [...document.querySelectorAll('#ms-support-dd input[type=checkbox]:checked')].map(el => el.value);
  const btn = document.getElementById('ms-support-btn');
  if (checked.length === 0) {
    document.getElementById('ms-support-label').textContent = 'All Support statuses';
    btn.classList.remove('active');
  } else if (checked.length === 1) {
    document.getElementById('ms-support-label').textContent = checked[0];
    btn.classList.add('active');
  } else {
    document.getElementById('ms-support-label').textContent = checked.length + ' statuses selected';
    btn.classList.add('active');
  }
  render();
}

function clearStatuses() {
  document.querySelectorAll('#ms-support-dd input[type=checkbox]').forEach(cb => cb.checked = false);
  onStatusChange();
}

document.addEventListener('click', function(e) {
  const wrap = document.getElementById('ms-support-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('ms-support-dd').style.display = 'none';
    document.getElementById('ms-support-btn').classList.remove('open');
  }
});

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const ft = document.getElementById('f-type').value;
  const selectedStatuses = [...document.querySelectorAll('#ms-support-dd input[type=checkbox]:checked')].map(el => el.value);
  const fd = document.getElementById('f-dev').value;
  return DATA.filter(t => {
    if (ft && t.type !== ft) return false;
    if (selectedStatuses.length > 0 && !selectedStatuses.includes(t.supportStatus)) return false;
    if (fd && t.devStatus !== fd) return false;
    if (q) {
      const hay = [t.supportKey, t.devKey||'', t.summary, t.notes].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function getSorted(list) {
  return [...list].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === 'ybScore') { av = av === null ? 9999 : +av; bv = bv === null ? 9999 : +bv; }
    if (av == null) av = ''; if (bv == null) bv = '';
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });
}

function devStatusClass(s) {
  const m = (s||'').toLowerCase().replace(/\s+/g,'');
  return {todo:'s-todo',inprogress:'s-inprogress',onhold:'s-onhold',nextup:'s-nextup',done:'s-done'}[m] || 's-todo';
}
function supportStatusClass(s) {
  const m = (s||'').toLowerCase().replace(/\s+/g,'');
  if (m === 'escalated') return 's-escalated';
  if (m === 'waitingforsupport') return 's-waiting';
  if (m === 'inprogress') return 's-inprogress';
  if (m === 'done') return 's-done';
  return 's-todo';
}
function typeClass(t) { return 't-' + (t||'').toLowerCase(); }

function render() {
  const rows = getSorted(getFiltered());
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="10" class="no-results">No tickets match your filters.</td></tr>`;
  } else {
    tbody.innerHTML = rows.map(t => {
      const isDone = t.supportStatus === 'Done';
      const isDevTicket = t.devKey && t.devKey.startsWith('YEL-');
      const devLink = t.devKey
        ? (isDevTicket
            ? `<a href="${SITE}/browse/${t.devKey}" target="_blank">${t.devKey}</a>`
            : `<span style="color:var(--gray)">${t.devKey}</span>`)
        : `<span style="color:var(--gray)">—</span>`;
      const devPill = t.devStatus
        ? `<span class="pill ${devStatusClass(t.devStatus)}">${t.devStatus}</span>`
        : `<span style="color:var(--gray)">—</span>`;
      return `<tr class="${isDone ? 'done-row' : ''}">
        <td class="key"><a href="${SITE}/browse/${t.supportKey}" target="_blank">${t.supportKey}</a></td>
        <td><span class="tag ${typeClass(t.type)}">${t.type}</span></td>
        <td class="summary" title="${esc(t.summary)}">${esc(t.summary)}</td>
        <td style="white-space:nowrap;color:var(--gray);font-size:11px">${esc(t.reporter || '—')}</td>
        <td><span class="pill ${supportStatusClass(t.supportStatus)}">${t.supportStatus}</span></td>
        <td class="key">${devLink}</td>
        <td style="color:var(--gray);white-space:nowrap;font-size:11px">${t.devKey && SPRINTS[t.devKey] ? esc(SPRINTS[t.devKey]) : '—'}</td>
        <td>${devPill}</td>
        <td style="color:var(--gray);white-space:nowrap">${t.created}</td>
        <td>
          <input class="score-input" type="number" min="1" max="20"
            value="${t.ybScore !== null ? t.ybScore : ''}"
            placeholder="—"
            onchange="onScore('${t.supportKey}',this)"
            oninput="clamp(this)">
        </td>
        <td>
          <textarea class="notes-input" rows="2" placeholder="Add notes…"
            onchange="onNotes('${t.supportKey}',this)">${esc(t.notes||'')}</textarea>
        </td>
      </tr>`;
    }).join('');
  }
  renderStats();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function clamp(el) {
  const v = parseInt(el.value);
  if (el.value !== '' && !isNaN(v)) {
    if (v < 1) el.value = 1;
    if (v > 20) el.value = 20;
  }
}

function onScore(key, el) {
  const t = DATA.find(x => x.supportKey === key);
  if (!t) return;
  const v = parseInt(el.value);
  t.ybScore = (el.value === '' || isNaN(v)) ? null : Math.min(20, Math.max(1, v));
  save(key);
  renderStats();
}

function onNotes(key, el) {
  const t = DATA.find(x => x.supportKey === key);
  if (!t) return;
  t.notes = el.value;
  save(key);
}

function renderStats() {
  const open = DATA.filter(t => t.supportStatus !== 'Done').length;
  const done = DATA.filter(t => t.supportStatus === 'Done').length;
  const bugs = DATA.filter(t => t.type === 'Bug' && t.supportStatus !== 'Done').length;
  document.getElementById('stats-bar').innerHTML = [
    {val: open, lbl:'Open'},
    {val: done, lbl:'Done'},
    {val: bugs, lbl:'Open Bugs'},
  ].map(s => `<div class="stat"><div class="val">${s.val}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

function exportCSV() {
  const rows = getSorted(getFiltered());
  const hdr = ['Support Key','Type','Summary','Support Status','Dev Key','Dev Status','Priority','Created','YB Score','Notes'];
  const csv = [hdr, ...rows.map(t => [
    t.supportKey, t.type, '"'+t.summary.replace(/"/g,'""')+'"', t.supportStatus,
    t.devKey||'', t.devStatus||'', t.priority, t.created,
    t.ybScore ?? '', '"'+(t.notes||'').replace(/"/g,'""')+'"'
  ])].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'yellowbeard-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

document.getElementById('sync-date').textContent = SYNC;
document.querySelectorAll('#thead-row th')[7].className = 'desc';

    document.getElementById('pw-input').value = '';

if (sessionStorage.getItem('yb-auth') === '1') {
  document.getElementById('pw-gate').classList.add('hidden');
}

loadScores(); // loads from server then renders
loadSprints(); // loads sprint names from Jira via serverless function
